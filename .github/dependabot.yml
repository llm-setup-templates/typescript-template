# Dependabot configuration — weekly npm + github-actions updates.
# Beginner-friendly defaults: bounded PR volume, labeled for triage.
# See README.md § Tips for the `groups:` opt-in that batches related PRs.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
