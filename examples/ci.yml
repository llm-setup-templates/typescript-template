name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'refactor/**', 'docs/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Format * Typecheck * Architecture * Lint * Test * Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # commitlint scans pull-request commit range; needs full history
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Architecture boundary check
        run: npm run depcruise

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Add project-specific env vars here
          # Example: NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_TELEMETRY_DISABLED: 1
